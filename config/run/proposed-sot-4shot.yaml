# SoT-Prompt (proposed method) with 4-shot demonstrations

run_id: proposed-sot-4shot

method:
  name: sot-prompt
  description: "Schema-of-Thought Prompting with multi-schema scoring"
  shot_budget: 4
  use_schema_scoring: true
  use_structure_scoring: true
  use_brevity_scoring: true
  use_answer_consistency: true
  
inference:
  dataset: gsm8k
  model: gemini-2.5-flash
